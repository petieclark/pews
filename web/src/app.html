<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Performance: Preconnect to API domain -->
		<link rel="preconnect" href="%VITE_API_URL%" crossorigin />
		<link rel="dns-prefetch" href="%VITE_API_URL%" />
		
		<!-- Font optimization (if using web fonts) -->
		<style>
			/* Ensure system fonts load immediately */
			body {
				font-display: swap;
			}
		</style>
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
