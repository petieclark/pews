version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pews
      POSTGRES_USER: pews
      POSTGRES_PASSWORD: pews
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pews"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8190:8080"
    environment:
      DATABASE_URL: postgres://pews:pews@postgres:5432/pews?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_xxx}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_xxx}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-price_xxx}
      PORT: 8080
      FRONTEND_URL: http://localhost:5273
    volumes:
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5273:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8190
    depends_on:
      - backend

volumes:
  postgres_data:
  backup_data:
