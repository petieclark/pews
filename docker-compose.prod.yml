version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pews
      POSTGRES_USER: pews
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - pews_postgres_data:/var/lib/postgresql/data
    networks:
      - pews-internal
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pews"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: pews-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://pews:$${DB_PASSWORD}@postgres:5432/pews?sslmode=disable
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      STRIPE_SECRET_KEY_FILE: /run/secrets/stripe_secret_key
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL:-https://demo.pews.app}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pews-internal
      - web_proxy
    secrets:
      - db_password
      - jwt_secret
      - stripe_secret_key
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - "traefik.enable=true"
      # Backend API router
      - "traefik.http.routers.pews-backend.rule=Host(`${DOMAIN:-demo.pews.app}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.pews-backend.entrypoints=websecure"
      - "traefik.http.routers.pews-backend.tls=true"
      - "traefik.http.routers.pews-backend.tls.certresolver=myresolver"
      - "traefik.http.routers.pews-backend.priority=10"
      - "traefik.http.routers.pews-backend.middlewares=public-chain@file"
      - "traefik.http.services.pews-backend.loadbalancer.server.port=8080"
      - "traefik.http.services.pews-backend.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.pews-backend.loadbalancer.healthcheck.interval=30s"
      # Explicitly attach to web_proxy network for Traefik
      - "traefik.docker.network=web_proxy"

  frontend:
    image: pews-frontend:latest
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${FRONTEND_URL:-https://demo.pews.app}
    environment:
      VITE_API_URL: ${FRONTEND_URL:-https://demo.pews.app}
      ORIGIN: ${FRONTEND_URL:-https://demo.pews.app}
      PORT: "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pews-internal
      - web_proxy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      # Frontend router
      - "traefik.http.routers.pews-frontend.rule=Host(`${DOMAIN:-demo.pews.app}`)"
      - "traefik.http.routers.pews-frontend.entrypoints=websecure"
      - "traefik.http.routers.pews-frontend.tls=true"
      - "traefik.http.routers.pews-frontend.tls.certresolver=myresolver"
      - "traefik.http.routers.pews-frontend.priority=1"
      - "traefik.http.routers.pews-frontend.middlewares=public-chain@file"
      - "traefik.http.services.pews-frontend.loadbalancer.server.port=3000"
      - "traefik.http.services.pews-frontend.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.pews-frontend.loadbalancer.healthcheck.interval=30s"
      # Explicitly attach to web_proxy network for Traefik
      - "traefik.docker.network=web_proxy"

volumes:
  pews_postgres_data:
    driver: local

networks:
  pews-internal:
    driver: bridge
  web_proxy:
    external: true

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  stripe_secret_key:
    file: ./secrets/stripe_secret_key.txt
